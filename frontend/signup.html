<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> To Do App | Signup </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="./">
                <img src="./images/logo.svg" height="50px" width="auto">
            </a>

            <!-- Hamburger menu button (visible on smaller screens) -->
            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
                <img src="./Images/Hamburger.svg" alt="hamburger icon" height="40px" width="auto">
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-lg-auto text-center text-lg-start">
                    <li class="nav-item">
                        <a class="nav-link" href="./features.html">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./pricing.html">Pricing</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./support.html">Support</a>
                    </li>

                    <!-- Button nav items -->
                    <li class="nav-item d-block d-lg-none">
                        <a class="nav-link" href="./login.html">Login</a>
                    </li>
                    <li class="nav-item d-block d-lg-none">
                        <a class="nav-link" href="./signup.html">Signup</a>
                    </li>
                </ul>

                <!-- Buttons only visible on large screens -->
                <div class="d-flex gap-2 d-none d-lg-block ms-3">
                    <a class="btn btn-primary" href="./login.html">Login</a>
                    <a class="btn btn-outline-light" href="./signup.html">Signup</a>
                </div>

            </div>

        </div>
    </nav>

<!-- ↓ Signup Form ↓ -->
    <section class="d-flex justify-content-center flex-column align-items-center bg-img">
        <div class="rounded shadow bg-translucent p-4">
            <h2 class="mb-3 text-white">Create Account</h2>
            <form id="signupForm">
                <input id="firstName" placeholder="First Name" required type="text" class="mb-3 form-control shadow-sm">
                <input id="lastName" placeholder="Last Name" required type="text" class="mb-3 form-control shadow-sm">
                <input id="email" placeholder="Email Address" required type="email" class="mb-3 form-control shadow-sm">
                <input id="password" placeholder="Password" required type="password" class="form-control shadow-sm">
                <div class="d-flex justify-content-between align-items-center gap-3 mt-3">
                    <button type="submit" class="btn btn-primary shadow-sm">Sign Up</button>
                    <div class="text-end">
                        <a href="./login.html">Already have an account?</a>  
                        <br>
                        <a href="./dashboard.html">Try without an account</a>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <!-- ↑ Signup Form ↑ -->

    <!-- ↓ Footer ↓ -->
    <footer>
        <div class="py-5 container">
            <div class="d-flex justify-content-between flex-column gap-5 gap-md-0 flex-md-row align-items-center px-3 mb-5">
                <a href="./">
                    <img src="./Images/logo.svg" alt="logo" height="100px" width="auto">
                </a>
                <div class="col-12 col-sm-8 col-md-7 col-lg-5 col-xl-4">
                    <h3 class="text-white mb-3 text-center text-md-start">Subscribe to our Newsletter</h3>
                    <div class="input-group">
                        <input  placeholder="Enter your email" type="email" class="form-control">
                        <button class="btn btn-primary"> Subscribe </button>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center flex-column gap-3 flex-md-row align-items-center">
                <a class="nav-link" href="#">Privacy Policy</a>
                <p class="m-0 d-none d-md-block">|</p>
                <a class="nav-link" href="#">Terms of Service</a>
                <p class="mb-0 me-3 d-none d-md-block">|</p>
                <p class="m-0"> ListMe &COPY; 2025 All Rights Reserved </p>
            </div>
        </div>
    </footer>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
